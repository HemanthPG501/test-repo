name: Generate Partial Config ZIP

on:
  pull_request:
    types: [closed]
    branches:
      - rel    # your release branch

jobs:
  generate-config:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout rel branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch master and rel branches
        run: |
          git fetch origin master
          git fetch origin rel

      - name: Get changed files (rel vs master)
        run: |
          git diff --name-only --diff-filter=ACMRT origin/master...origin/rel > changed_files.txt
          echo "Changed files:"
          cat changed_files.txt
          
      # ✅ Create ZIP directly from file list (no wrapper folder)
      - name: Create ZIP (no wrapper folder)
        run: |
          zip -@ partial-config.zip < changed_files.txt

      # ✅ Upload ZIP separately
      - name: Upload partial config ZIP
        uses: actions/upload-artifact@v4
        with:
          name: partial-config-zip
          path: partial-config.zip

      # ✅ Upload file list separately
      - name: Upload changed files list
        uses: actions/upload-artifact@v4
        with:
          name: changed-files-list
          path: changed_files.txt

