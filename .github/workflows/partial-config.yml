name: Generate Partial Config ZIP

on:
  pull_request:
    types: [closed]
    branches:
      - rel    # your release branch

jobs:
  generate-config:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout rel branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch master and rel branches
        run: |
          git fetch origin master
          git fetch origin rel

      - name: Get changed files (rel vs master)
        run: |
          git diff --name-only --diff-filter=ACMRT origin/master...origin/rel > changed_files.txt
          echo "Changed files:"
          cat changed_files.txt
      
      # ✅ Create folder for partial config
      - name: Prepare partial config folder
        run: |
          mkdir -p generated-config/partial-config

          while read file; do
            if [ -f "$file" ]; then
              mkdir -p generated-config/partial-config/$(dirname "$file")
              cp "$file" generated-config/partial-config/$file
            fi
          done < changed_files.txt

      # ✅ Move changed_files.txt into main folder
      - name: Move file list
        run: |
          mv changed_files.txt generated-config/

      # ✅ Upload everything as ONE artifact
      - name: Upload generated config
        uses: actions/upload-artifact@v4
        with:
          name: generated-config
          path: generated-config
